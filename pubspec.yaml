name: diyaa_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  geolocator: ^13.0.2
  adhan_dart: ^1.2.0
  flutter_local_notifications: ^20.1.0
  flutter_local_notifications_windows: ^3.0.0
  timezone: any
  hijri: ^3.0.0
  confetti: ^0.8.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  flutter_timezone: ^5.0.2
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/azkar.json
    - assets/adhkar_source.json
    - assets/azkar.txt
    - assets/icon.png
    - assets/sounds/
    - assets/lang/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon_light.png"
  image_path_ios_dark: "assets/icon_dark.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FAFAF5"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  monochrome: "assets/notification_icon.png"