name: diyaa
description: "Diyaa — A beautiful Azkar app for daily remembrance."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  geolocator: ^13.0.2
  adhan_dart: ^1.2.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  hijri: ^3.0.0
  confetti: ^0.8.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/azkar.json
    - assets/adhkar_source.json
    - assets/azkar.txt
    - assets/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/icon.png"
